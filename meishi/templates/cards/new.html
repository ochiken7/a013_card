{% extends "base.html" %}

{% block title %}名刺登録 - 名刺管理{% endblock %}

{% block content %}
<h4 class="mb-3"><i class="bi bi-camera me-1"></i>名刺登録</h4>

<form method="post" action="{{ url_for('cards.create_card') }}" enctype="multipart/form-data">
    <!-- 表面画像 -->
    <div class="mb-3">
        <label class="form-label fw-bold">表面の画像 <span class="text-danger">*</span></label>
        <div id="front-preview" class="mb-2" style="display:none;">
            <div class="text-center">
                <img id="front-preview-img" class="img-fluid rounded border" style="max-height: 200px;">
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-dark flex-fill" onclick="document.getElementById('front_camera').click()">
                <i class="bi bi-camera me-1"></i>カメラで撮影
            </button>
            <button type="button" class="btn btn-outline-secondary flex-fill" onclick="document.getElementById('front_file').click()">
                <i class="bi bi-image me-1"></i>写真を選択
            </button>
        </div>
        <input type="file" name="front_image" id="front_camera" class="d-none"
               accept="image/*" capture="environment"
               onchange="previewImage(this, 'front-preview', 'front-preview-img')">
        <input type="file" name="front_image" id="front_file" class="d-none"
               accept="image/*"
               onchange="previewImage(this, 'front-preview', 'front-preview-img')">
    </div>

    <!-- 裏面画像 -->
    <div class="mb-3">
        <div id="back-section" style="display:none;">
            <label class="form-label fw-bold">裏面の画像</label>
            <div id="back-preview" class="mb-2" style="display:none;">
                <div class="text-center">
                    <img id="back-preview-img" class="img-fluid rounded border" style="max-height: 200px;">
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-dark flex-fill" onclick="document.getElementById('back_camera').click()">
                    <i class="bi bi-camera me-1"></i>カメラで撮影
                </button>
                <button type="button" class="btn btn-outline-secondary flex-fill" onclick="document.getElementById('back_file').click()">
                    <i class="bi bi-image me-1"></i>写真を選択
                </button>
            </div>
            <input type="file" name="back_image" id="back_camera" class="d-none"
                   accept="image/*" capture="environment"
                   onchange="previewImage(this, 'back-preview', 'back-preview-img')">
            <input type="file" name="back_image" id="back_file" class="d-none"
                   accept="image/*"
                   onchange="previewImage(this, 'back-preview', 'back-preview-img')">
        </div>
        <button type="button" id="add-back-btn" class="btn btn-outline-secondary btn-sm"
                onclick="document.getElementById('back-section').style.display='block'; this.style.display='none';">
            <i class="bi bi-plus me-1"></i>裏面を追加
        </button>
    </div>

    <!-- 公開設定 -->
    <div class="mb-3">
        <label class="form-label fw-bold">公開設定</label>
        <select name="visibility" class="form-select">
            <option value="shared">社内共有</option>
            <option value="private">自分のみ</option>
        </select>
    </div>

    <!-- 送信 -->
    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-dark btn-lg" id="submit-btn">
            <i class="bi bi-cpu me-1"></i>OCR読取を開始
        </button>
        <a href="{{ url_for('cards.index') }}" class="btn btn-outline-secondary">キャンセル</a>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
function previewImage(input, previewDivId, imgId) {
    const previewDiv = document.getElementById(previewDivId);
    const img = document.getElementById(imgId);
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            img.src = e.target.result;
            previewDiv.style.display = 'block';
            // プレビュー表示後、スクロール位置を維持する
            // （画像ロードによるリフローでの跳ね返りを防ぐ）
            requestAnimationFrame(function() {
                input.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        };
        reader.readAsDataURL(input.files[0]);
    }
}

// 送信時にローディング表示 + front_imageのバリデーション
document.querySelector('form').addEventListener('submit', function(e) {
    const frontCamera = document.getElementById('front_camera');
    const frontFile = document.getElementById('front_file');
    if (!frontCamera.files.length && !frontFile.files.length) {
        e.preventDefault();
        alert('表面の画像を選択してください。');
        return;
    }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>読取中...（しばらくお待ちください）';
});
</script>
{% endblock %}
