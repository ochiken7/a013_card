{% extends "base.html" %}

{% block title %}名刺登録 - 名刺管理{% endblock %}

{% block content %}
<h4 class="mb-3"><i class="bi bi-camera me-1"></i>名刺登録</h4>

<form id="upload-form" method="post" action="{{ url_for('cards.create_card') }}" enctype="multipart/form-data">
    <!-- 表面画像 -->
    <div class="mb-3">
        <label class="form-label fw-bold">表面の画像 <span class="text-danger">*</span></label>
        <div id="front-preview" class="mb-2" style="display:none;">
            <div class="text-center">
                <img id="front-preview-img" class="img-fluid rounded border" style="max-height: 200px;">
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-dark flex-fill" onclick="pickImage('front', true)">
                <i class="bi bi-camera me-1"></i>カメラで撮影
            </button>
            <button type="button" class="btn btn-outline-secondary flex-fill" onclick="pickImage('front', false)">
                <i class="bi bi-image me-1"></i>写真を選択
            </button>
        </div>
        <input type="file" id="front_picker" class="d-none" accept="image/*,application/pdf"
               onchange="handleFile(this, 'front')">
    </div>

    <!-- 裏面画像 -->
    <div class="mb-3">
        <div id="back-section" style="display:none;">
            <label class="form-label fw-bold">裏面の画像</label>
            <div id="back-preview" class="mb-2" style="display:none;">
                <div class="text-center">
                    <img id="back-preview-img" class="img-fluid rounded border" style="max-height: 200px;">
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-dark flex-fill" onclick="pickImage('back', true)">
                    <i class="bi bi-camera me-1"></i>カメラで撮影
                </button>
                <button type="button" class="btn btn-outline-secondary flex-fill" onclick="pickImage('back', false)">
                    <i class="bi bi-image me-1"></i>写真を選択
                </button>
            </div>
            <input type="file" id="back_picker" class="d-none" accept="image/*,application/pdf"
                   onchange="handleFile(this, 'back')">
        </div>
        <button type="button" id="add-back-btn" class="btn btn-outline-secondary btn-sm"
                onclick="document.getElementById('back-section').style.display='block'; this.style.display='none';">
            <i class="bi bi-plus me-1"></i>裏面を追加
        </button>
    </div>

    <!-- 公開設定 -->
    <div class="mb-3">
        <label class="form-label fw-bold">公開設定</label>
        <select name="visibility" class="form-select">
            <option value="shared">社内共有</option>
            <option value="private">自分のみ</option>
        </select>
    </div>

    <!-- 送信 -->
    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-dark btn-lg" id="submit-btn">
            <i class="bi bi-cpu me-1"></i>OCR読取を開始
        </button>
        <a href="{{ url_for('cards.index') }}" class="btn btn-outline-secondary">キャンセル</a>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
// 処理済みファイルを保持（画像=圧縮Blob、PDF=元ファイル）
const preparedFiles = { front: null, back: null };
const isPdf = { front: false, back: false };
const MAX_SIZE = 2048;
const JPEG_QUALITY = 0.85;

function pickImage(side, useCamera) {
    const picker = document.getElementById(side + '_picker');
    if (useCamera) {
        picker.setAttribute('capture', 'environment');
    } else {
        picker.removeAttribute('capture');
    }
    picker.click();
}

function handleFile(input, side) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];

    if (file.type === 'application/pdf') {
        // PDFはそのまま保持（サーバー側で画像変換）
        preparedFiles[side] = file;
        isPdf[side] = true;
        // プレビューにPDFアイコンを表示
        const previewDiv = document.getElementById(side + '-preview');
        const previewImg = document.getElementById(side + '-preview-img');
        previewImg.src = '';
        previewImg.alt = 'PDF: ' + file.name;
        previewImg.style.display = 'none';
        // PDFラベルを表示
        let label = previewDiv.querySelector('.pdf-label');
        if (!label) {
            label = document.createElement('div');
            label.className = 'pdf-label text-center p-3';
            previewDiv.querySelector('.text-center').appendChild(label);
        }
        label.innerHTML = '<i class="bi bi-file-earmark-pdf" style="font-size:2.5rem;color:#dc3545;"></i>'
            + '<div class="small text-muted mt-1">' + file.name + '</div>';
        previewDiv.style.display = 'block';
        // PDFの場合は裏面セクションを隠す（PDF内に含まれるため）
        if (side === 'front') {
            document.getElementById('back-section').style.display = 'none';
            document.getElementById('add-back-btn').style.display = 'none';
        }
        return;
    }

    // 画像: Canvasで縮小してBlobにする
    isPdf[side] = false;
    // PDFから画像に戻した場合、裏面ボタンを復活
    if (side === 'front') {
        document.getElementById('add-back-btn').style.display = '';
        // PDFラベルがあれば消す
        const oldLabel = document.getElementById('front-preview').querySelector('.pdf-label');
        if (oldLabel) oldLabel.remove();
        document.getElementById('front-preview-img').style.display = '';
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            let w = img.width, h = img.height;
            if (Math.max(w, h) > MAX_SIZE) {
                if (w > h) {
                    h = Math.round(h * MAX_SIZE / w);
                    w = MAX_SIZE;
                } else {
                    w = Math.round(w * MAX_SIZE / h);
                    h = MAX_SIZE;
                }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            canvas.toBlob(function(blob) {
                preparedFiles[side] = blob;
                const previewDiv = document.getElementById(side + '-preview');
                const previewImg = document.getElementById(side + '-preview-img');
                previewImg.src = URL.createObjectURL(blob);
                previewDiv.style.display = 'block';
            }, 'image/jpeg', JPEG_QUALITY);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// フォーム送信を横取りして、処理済みファイルをFormDataで送る
document.getElementById('upload-form').addEventListener('submit', function(e) {
    e.preventDefault();

    if (!preparedFiles.front) {
        alert('表面の画像またはPDFを選択してください。');
        return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>読取中...（しばらくお待ちください）';

    const fd = new FormData();
    if (isPdf.front) {
        fd.append('front_image', preparedFiles.front, preparedFiles.front.name);
    } else {
        fd.append('front_image', preparedFiles.front, 'front.jpg');
    }
    if (preparedFiles.back && !isPdf.front) {
        if (isPdf.back) {
            fd.append('back_image', preparedFiles.back, preparedFiles.back.name);
        } else {
            fd.append('back_image', preparedFiles.back, 'back.jpg');
        }
    }
    fd.append('visibility', this.querySelector('[name=visibility]').value);

    fetch(this.action, {
        method: 'POST',
        body: fd,
        redirect: 'follow',
    }).then(function(resp) {
        window.location.href = resp.url;
    }).catch(function(err) {
        alert('アップロードに失敗しました: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-cpu me-1"></i>OCR読取を開始';
    });
});
</script>
{% endblock %}
