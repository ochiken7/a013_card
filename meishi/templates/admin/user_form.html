{% extends "base.html" %}

{% block title %}ユーザー登録 - 名刺管理{% endblock %}

{% block content %}
<h4 class="mb-3"><i class="bi bi-person-plus me-1"></i>新規ユーザー登録</h4>

<form method="post">
    <div class="row g-3" style="max-width: 500px;">
        <div class="col-12">
            <label class="form-label">表示名 <span class="text-danger">*</span></label>
            <input type="text" name="display_name" class="form-control" required>
        </div>
        <div class="col-12">
            <label class="form-label">メールアドレス <span class="text-danger">*</span></label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="col-12">
            <label class="form-label">パスワード <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="col-12">
            <div class="form-check">
                <input type="checkbox" name="is_admin" value="1" class="form-check-input" id="is_admin">
                <label class="form-check-label" for="is_admin">管理者権限を付与</label>
            </div>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-dark">登録する</button>
            <a href="{{ url_for('admin.user_list') }}" class="btn btn-outline-secondary ms-2">キャンセル</a>
        </div>
    </div>
</form>
{% endblock %}
